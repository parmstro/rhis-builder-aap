---
# Build and upload an ee
- name: "Create the base directory"
  ansible.builtin.file:
    path: "{{ ee.git_dest }}"
    state: directory
    mode: "0644"

- name: "Clone the git repo for the ee"
  ansible.builtin.git:
    repo: "{{ ee.git_repo }}"
    version: "{{ ee.git_revision | default(omit) }}"
    dest: "{{ ee.git_dest }}/{{ ee.name }}"
    clone: "{{ ee.git_clone | default(omit) }}"
    force: "{{ ee.git_force | default(omit) }}"

- name: "Template the exec_envs definition"
  ansible.builtin.template:
    src: "execution-environment.yml.j2"
    dest: "{{ ee.git_dest }}/{{ ee.name }}/execution-environment.yml"
    mode: "0600"

- name: "Template the ansible requirements.yml"
  ansible.builtin.template:
    src: "{{ ee.ansible_requirements_template }}"
    dest: "{{ ee.git_dest }}/{{ ee.name }}/requirements.yml"
    mode: "0600"

- name: "Template the python requirements.txt"
  ansible.builtin.template:
    src: "{{ ee.python_requirements_template }}"
    dest: "{{ ee.git_dest }}/{{ ee.name }}/requirements.txt"
    mode: "0600"

- name: "Template the system requirements bindep.txt"
  ansible.builtin.template:
    src: "{{ ee.system_requirements_template }}"
    dest: "{{ ee.git_dest }}/{{ ee.name }}/bindep.txt"
    mode: "0600"

- name: "Get the satellite API certificate"
  ansible.builtin.get_url:
    url: "{{ satellite_url }}/pub/katello-server-ca.crt"
    dest: "{{ ee.git_dest }}/{{ ee.name }}/katello-server-ca.crt"
    mode: "0644"

- name: "Add our ca certficate to the image"
  ansible.builtin.copy:
    src: "{{ ee.git_dest }}/{{ ee.name }}/katello-server-ca.crt"
    dest: "{{ ee.git_dest }}/{{ ee.name }}/context"
    mode: "0644"
    remote_src: true

- name: "Build the ee on the target os"
  ansible.builtin.command: "ansible-builder build -t {{ ee.name }}"
  args:
    chdir: "{{ ee.git_dest }}/{{ ee.name }}"
  register: build_result
  changed_when: build_result.rc == 0

- name: "Set the deployment status"
  ansible.builtin.set_fact:
    hub_is_deployed: false

- name: "Check the private automation hub endpoint"
  ansible.builtin.uri:
    url: "http://{{ groups['aap_hubs'][0] }}/v2"
  register: hub_uri_result
  failed_when: false

- name: "Set the deployment status"
  when: hub_uri_result.status == 200
  ansible.builtin.set_fact:
    hub_is_deployed: true

- name: "Push the finished container to the hub"
  when: hub_is_deployed
  containers.podman.podman_image:
    name: "{{ ee.name }}"
    push: true
    username: "{{ aap_admin_username }}"
    password: "{{ aap_admin_password }}"
    push_args:
      destination: "{{ groups['aap_hubs'][0] }}/{{ ee.name }}:latest"
      remove_signatures: "{{ ee.remove_signatures | default(true) }}"
    validate_certs: "{{ aap_hub_validate_certs | default(false) }}"

- name: "Clean up the deployment directory"
  ansible.builtin.file:
    path: "{{ ee.git_dest }}/{{ ee.name }}"
    state: absent
